<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Buscador de CEP</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

<div id="paginaValidade">
    <h2>Valide seu acesso</h2>

    <form id="formValidade">
        <input type="text" placeholder="Nome" required>
        <input type="email" placeholder="Email" required>

        <div class="cf-turnstile" data-sitekey="SEU_SITE_KEY"></div>

        <button type="submit">Entrar</button>
    </form>

    <p id="mensagemErro" style="display:none;color:red;">Resolva o captcha</p>
</div>

<div id="buscador" style="display:none;">
    <h1>Buscar CEP</h1>

    <input type="text" id="cep" placeholder="CEP">
    <input type="text" id="numero" placeholder="Número">

    <button id="btnBuscar">Buscar</button>
    <button id="btnLimpar">Limpar</button>

    <div id="resultado"></div>
</div>

<script src="script.js"></script>
</body>
</html>
