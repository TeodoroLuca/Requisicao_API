<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Consulta de CEP</title>
    <link rel="stylesheet" href="style.css">

    <!-- Script do Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

<!-- Página de Validação -->
<div id="paginaValidade">
    <h2>Valide seu acesso</h2>
    <p>Preencha seus dados e confirme que você não é um robô.</p>

    <!-- Formulário de Validação -->
    <form id="formValidade">
        <input type="text" id="nome" placeholder="Seu nome" required>
        <input type="email" id="email" placeholder="Seu e-mail" required>

        <!-- CAPTCHA Turnstile -->
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAC3Y2IQ1RTJpOBUp"></div>

        <button type="submit" id="btnValidar">Validar</button>
    </form>

    <p id="mensagemErro" style="color: red; display: none;">⚠️ Você precisa resolver o CAPTCHA para continuar.</p>
</div>

<!-- Tela inicial (buscador) -->
<div id="bemVindo" style="display: none;">
    <h2>Bem-vindo ao Buscador de Endereço</h2>
    <p>Clique no botão abaixo para iniciar</p>
    <button id="btnIniciar">Iniciar</button>
</div>

<!-- Buscador -->
<div class="container" id="buscador" style="display: none;">

    <!-- BOTÃO VOLTAR -->
    <button id="btnVoltar">← Voltar</button>

    <h1>BUSCADOR DE ENDEREÇO</h1>
    <h2>DIGITE SOMENTE NÚMEROS</h2>

    <input type="text" id="cep" placeholder="Digite o CEP">
    <input type="text" id="numero" placeholder="Número da residência">

    <!-- CAPTCHA MODERNO -->
    <div class="cf-turnstile" data-sitekey="0x4AAAAAAC3Y2IQ1RTJpOBUp"></div>

    <button id="btnBuscar">Buscar</button>
    <button id="btnLimpar">Limpar</button>

    <div id="resultado"></div>
</div>

<script src="script.js"></script>
</body>
</html>
