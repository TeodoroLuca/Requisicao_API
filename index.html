<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de CEP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

<div id="paginaValidade">
    <h2>Valide seu acesso</h2>
    <p>Confirme que você não é um robô para continuar.</p>

    <form id="formValidade">
        <input type="text" id="nome" placeholder="Seu nome" required>
        <input type="email" id="email" placeholder="Seu e-mail" required>

        <div id="captcha-container" class="cf-turnstile" data-sitekey="0x4AAAAAAC3Y2IQ1RTJpOBUp"></div>

        <button type="submit" id="btnValidar">Validar e Entrar</button>
    </form>

    <p id="mensagemErro" style="color: red; display: none; margin-top: 10px;">⚠️ Por favor, resolva o CAPTCHA.</p>
</div>

<div class="container" id="buscador" style="display: none;">
    <button id="btnVoltar">← Sair</button>

    <h1>BUSCADOR DE ENDEREÇO</h1>
    <h2>DIGITE SOMENTE NÚMEROS</h2>

    <input type="text" id="cep" placeholder="Digite o CEP">
    <input type="text" id="numero" placeholder="Número da residência">

    <button id="btnBuscar">Buscar CEP</button>
    <button id="btnLimpar">Limpar</button>

    <div id="resultado"></div>
</div>

<script src="script.js"></script>
</body>
</html>
